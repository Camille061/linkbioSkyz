<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="phone">

  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-pic">
        <img style="border-radius: 50%; border: solid #ff00c8  4px; box-shadow: 0 4px 10px #ff0000; height: 150px; width: 150px;" src="/img/th.jpg"">
      </div>
    </div>
    <h1 class="name">Skyz</h1>
    <div class="handle">@functionalertkuy</div>
    <p style="font-size: 16px; color: #ff0000; text-shadow: 0 4px 10px#ff0000cf; text-decoration: underline;" class="tagline">ไม่หล่อติดต่อยาก</p>
    <div class="pills">
      <span class="pill">bot</span>
      <span class="pill">minecraft</span>
      <span class="pill">Dev</span>
    </div>
  </div>

  <div class="frames" id="frames">


    <a href="https://www.instagram.com/functionalertkuy1?igsh=NGFoem40OG5rNmZm" class="frame">
      <div class="frame-body">  
        <div style="color: #ff00c8; text-shadow: 0 4px 10px #ff7ff969;" class="frame-title">Instagram</div>
        <div class="frame-sub">ไอจีเก่าโดนแบน😭</div>
      </div>
      <div class="frame-arrow">↗</div>
    </a>

    <a href="https://www.tiktok.com/@linkbio4?_r=1&_t=ZS-983Zi7AhHKG" class="frame">
      <div class="frame-body">
        <div style="text-shadow: 0 4px 10px #d5d5d58c;" class="frame-title">TikTok</div>
        <div class="frame-sub">กดใจให้ด้วย</div>
      </div>
      <div class="frame-arrow">↗</div>
    </a>

    <a href="https://discord.gg/Awns5juy" class="frame">
      <div class="frame-body">
        <div style="color: #9f26fc; font-weight: bold; text-shadow: 0 4px 10px #e24effa3; class="frame-title">Discord  </div>
        <div class="frame-sub">มาเมคได้</div>
      </div>
      <div class="frame-arrow">↗</div>
    </a>
        <a href="#" class="frame featured">
      <div class="frame-body">
        <div class="frame-title">Candy Bot Support</div>
        <div class="frame-sub">บอทแคนดี้โซคิ้ว</div>
      </div>
      <div class="frame-arrow">↗</div>
    </a>


  </div>

  <div class="footer">.</div>

</div>




<script>

  const sparkleCount = 22;
  for(let i=0;i<sparkleCount;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = Math.random()*2.5 + 1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = (Math.random()*3.4)+'s';
    document.body.appendChild(s);
  }


  document.querySelectorAll('.frame').forEach(card=>{
    card.addEventListener('mousemove', e=>{
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - r.left)+'px');
      card.style.setProperty('--my', (e.clientY - r.top)+'px');
    });
  });
</script>

</body>
</html>
